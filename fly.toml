# fly.toml app configuration file generated for payment-gateway-bot on 2026-06-19T07:34:25Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'payment-gateway-bot'
primary_region = 'sin'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '8080'
  START_BOT = 'true'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
